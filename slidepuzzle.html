<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a2a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Slide Puzzle">
    <meta name="description" content="Solve slide puzzles, earn progressive PMT rewards!">
    <title>🧩 SLIDE PUZZLE | Solve · Earn Progressive PMT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=DM+Mono:wght@500&display=swap');

        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            background: radial-gradient(ellipse at 25% 15%, #0a0a2a 0%, #0d0d35 50%, #0a0a2a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'DM Mono', monospace;
            padding: 10px;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        .game-container {
            width: 100%;
            max-width: 500px;
            background: rgba(10, 10, 42, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 12px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.75), inset 0 0 0 1px rgba(0, 255, 255, 0.15);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .screen { display: flex; flex-direction: column; gap: 10px; }
        .hidden { display: none !important; }

        .header-bar {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(0,0,0,0.38);
            border: 1px solid rgba(0, 255, 255, 0.1);
            border-radius: 13px;
            padding: 6px 9px;
        }

        .game-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            font-weight: 900;
            letter-spacing: 0.14em;
            color: #00ffff;
            text-shadow: 0 0 10px rgba(0,255,255,0.5);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .vdiv { width: 1px; height: 20px; background: rgba(0,255,255,0.2); flex-shrink: 0; }

        .level-group { display: flex; gap: 3px; flex-shrink: 0; }
        .level-btn {
            background: rgba(0,255,255,0.05);
            border: 1px solid rgba(0,255,255,0.15);
            color: rgba(0,255,255,0.5);
            font-family: 'DM Mono', monospace;
            font-size: 0.42rem;
            font-weight: 500;
            padding: 3px 6px;
            border-radius: 7px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
        }
        .level-btn .lv-icon { font-size: 0.68rem; }
        .level-btn .lv-name { font-size: 0.38rem; }
        .level-btn.unlocked { color: rgba(0,255,255,0.8); border-color: rgba(0,255,255,0.3); background: rgba(0,255,255,0.1); }
        .level-btn.active { background: linear-gradient(135deg, #00ffff, #0088ff); border-color: transparent; color: #0a0a2a; font-weight: 700; box-shadow: 0 0 9px rgba(0,255,255,0.45); }
        .level-btn.locked { opacity: 0.28; cursor: not-allowed; }

        .color-group { display: flex; gap: 4px; align-items: center; flex-shrink: 0; }
        .color-dot {
            width: 16px; height: 16px; border-radius: 50%;
            cursor: pointer; border: 2px solid rgba(0,255,255,0.3);
            transition: all 0.12s;
        }
        .color-dot.active { border-color: #fff; box-shadow: 0 0 8px #00ffff; transform: scale(1.2); }

        .goal-header {
            margin-left: auto;
            background: rgba(0,0,0,0.42);
            border: 1px solid rgba(0,255,255,0.35);
            border-radius: 10px;
            padding: 4px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }
        .goal-label { font-size: 0.4rem; letter-spacing: 0.12em; color: rgba(0,255,255,0.7); text-transform: uppercase; font-weight: 600; }
        .goal-grid { display: flex; flex-direction: column; gap: 2px; }
        .goal-row { display: flex; gap: 2px; justify-content: center; }
        .goal-cell {
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.45rem;
            font-weight: 700;
            color: #fff;
            width: 18px;
            height: 18px;
        }

        .coins-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 3px;
            font-size: 0.55rem;
            color: #ffdd00;
            padding: 0 6px;
        }

        #puzzleGrid {
            width: 100%;
            display: grid;
            gap: 4px;
            background: #0d0d35;
            padding: 8px;
            border-radius: 18px;
            box-shadow: inset 0 0 0 1.5px #00ffff, 0 8px 22px rgba(0,0,0,0.6);
        }
        .tile {
            background: #1a1a4a;
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-family: 'DM Mono', monospace;
            color: #00ffff;
            cursor: pointer;
            transition: transform 0.05s;
            box-shadow: 0 2px 0 #0a0a2a;
            touch-action: none;
            aspect-ratio: 1/1;
        }
        .tile:active { transform: scale(0.93); }
        .empty-tile { background: #2a2a6a !important; box-shadow: inset 0 0 0 1.5px rgba(0,255,255,0.45) !important; color: transparent; }

        .moves-area {
            display: flex;
            justify-content: center;
            margin-top: 4px;
        }
        .moves-panel {
            background: rgba(0,0,0,0.42);
            border: 1px solid rgba(0,255,255,0.22);
            border-radius: 40px;
            padding: 6px 20px;
            display: flex;
            align-items: baseline;
            gap: 10px;
        }
        .moves-label { font-size: 0.55rem; color: rgba(0,255,255,0.55); letter-spacing: 0.1em; }
        .moves-value { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; font-weight: 700; color: #00ffff; }

        .status-bar {
            background: rgba(0,0,0,0.3);
            border-radius: 30px;
            padding: 5px 14px;
            text-align: center;
            color: rgba(0,255,255,0.55);
            font-size: 0.52rem;
            letter-spacing: 0.06em;
            margin-top: 6px;
        }
        .status-bar.win { background: linear-gradient(90deg, #00ffff, #0088ff); color: #0a0a2a; font-weight: 700; }

        .btn {
            background: linear-gradient(135deg, #00ffff, #0088ff);
            border: none;
            border-radius: 40px;
            padding: 12px 24px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            font-size: 0.7rem;
            color: #0a0a2a;
            cursor: pointer;
            width: 100%;
            text-align: center;
        }
        .btn:active { transform: scale(0.97); }

        .ad-container {
            background: rgba(0,0,0,0.3);
            border: 1px dashed #00ffff;
            border-radius: 12px;
            padding: 6px;
            text-align: center;
            font-size: 0.45rem;
            color: #00ffff;
            letter-spacing: 0.1em;
        }

        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            background: linear-gradient(135deg, #00ffff, #0088ff);
            color: #0a0a2a;
            padding: 12px 26px;
            border-radius: 40px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
            z-index: 999;
            box-shadow: 0 16px 40px rgba(0,0,0,0.65);
            text-align: center;
            white-space: nowrap;
            animation: popIn 0.32s cubic-bezier(0.34,1.56,0.64,1);
        }

        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 15px 0;
            max-width: 300px;
            width: 100%;
        }
        .result-box {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0,255,255,0.3);
            border-radius: 16px;
            padding: 12px;
        }
        .result-label { font-size: 9px; color: rgba(0,255,255,0.6); text-transform: uppercase; }
        .result-value { font-family: 'Orbitron', monospace; font-size: 1.2rem; font-weight: bold; color: #ffdd00; }

        @keyframes popIn {
            0% { transform: translate(-50%,-50%) scale(0.3); opacity:0; }
            100% { transform: translate(-50%,-50%) scale(1); opacity:1; }
        }
        @media (max-width: 360px) {
            .goal-cell { width: 14px; height: 14px; font-size: 0.38rem; }
            .moves-value { font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="game-container">

    <!-- GAME SCREEN -->
    <div id="gameScreen" class="screen">
        <div class="header-bar">
            <div class="game-title">🧩 SLIDE</div>
            <div class="vdiv"></div>
            <div class="level-group" id="levelSelector">
                <button class="level-btn unlocked active" data-level="0"><span class="lv-icon">🌱</span><span class="lv-name">EASY</span></button>
                <button class="level-btn locked" data-level="1"><span class="lv-icon">🔥</span><span class="lv-name">MED</span></button>
                <button class="level-btn locked" data-level="2"><span class="lv-icon">💀</span><span class="lv-name">HARD</span></button>
                <button class="level-btn locked" data-level="3"><span class="lv-icon">🏆</span><span class="lv-name">EXT</span></button>
            </div>
            <div class="vdiv"></div>
            <div class="color-group">
                <div class="color-dot active" data-color="gold" style="background:#1a1a4a;"></div>
                <div class="color-dot" data-color="blue" style="background:#0a2a4a;"></div>
                <div class="color-dot" data-color="green" style="background:#0a2a1a;"></div>
                <div class="color-dot" data-color="purple" style="background:#2a0a4a;"></div>
            </div>
            <div class="goal-header">
                <div class="goal-label">🎯 GOAL</div>
                <div class="goal-grid" id="goalGrid"></div>
            </div>
        </div>
        <div class="coins-row">
            <span>⭐ SCORE: <span id="gameScore">0</span></span>
            <span>💰 PMT: <span id="gamePmt">0</span></span>
        </div>
        <div class="puzzle-outer">
            <div id="puzzleGrid"></div>
        </div>
        <div class="moves-area">
            <div class="moves-panel">
                <span class="moves-label">◈ MOVES ◈</span>
                <span class="moves-value" id="movesCount">0</span>
            </div>
        </div>
        <div class="status-bar" id="statusBar">✨ Tap tile next to empty space ✨</div>
        <div class="ad-container">📢 AD SPACE</div>
    </div>

    <!-- GAME OVER SCREEN -->
    <div id="gameOverScreen" class="screen hidden">
        <div class="header-bar">
            <div class="game-title">🧩 SLIDE</div>
        </div>
        <div style="text-align:center; margin:20px 0;">
            <div style="font-family:'Orbitron'; font-size:1.5rem; color:#00ffff;">🎉 LEVEL COMPLETE!</div>
        </div>
        <div class="result-grid">
            <div class="result-box"><div class="result-label">Level</div><div class="result-value" id="finalLevel">1</div></div>
            <div class="result-box"><div class="result-label">Earned</div><div class="result-value" id="finalEarned">0</div></div>
        </div>
        <button class="btn" id="nextLevelBtn">➡ NEXT LEVEL</button>
        <button class="btn" id="restartGameBtn" style="margin-top:8px;">🔄 RESTART</button>
    </div>
</div>

<script>
// =====================================================
// SLIDE PUZZLE — Pure Gameplay (No Auth)
// Progressive rewards per level
// Sends earnings to parent hub via postMessage
// =====================================================

// Send earnings to parent hub
function reportEarnings(amount) {
    if (window.parent !== window) {
        window.parent.postMessage({ type: 'earnPMT', game: 'slidepuzzle', amount: amount }, '*');
    }
    console.log(`🧩 Slide Puzzle earned: ${amount} PMT`);
}

// Level configurations
const LEVELS = [
    { rows: 3, cols: 3, name: "EASY", reward: 20 },
    { rows: 4, cols: 4, name: "MEDIUM", reward: 40 },
    { rows: 5, cols: 5, name: "HARD", reward: 80 },
    { rows: 6, cols: 6, name: "EXTREME", reward: 160 }
];

// Theme colors
const THEMES = {
    gold: { tile: "#1a1a4a", empty: "#2a2a6a", border: "#00ffff", text: "#00ffff" },
    blue: { tile: "#0a2a4a", empty: "#1a3a5a", border: "#44aaff", text: "#44aaff" },
    green: { tile: "#0a2a1a", empty: "#1a3a2a", border: "#44ff88", text: "#44ff88" },
    purple: { tile: "#2a0a4a", empty: "#3a1a5a", border: "#cc44ff", text: "#cc44ff" }
};

let currentTheme = "gold";
let currentLevel = 0;
let rows = 3, cols = 3;
let board = [];
let moves = 0;
let levelCompleted = false;
let totalScore = 0;
let totalPMT = 0;

// DOM elements
const gameScreen = document.getElementById('gameScreen');
const gameOverScreen = document.getElementById('gameOverScreen');
const puzzleGrid = document.getElementById('puzzleGrid');
const goalGrid = document.getElementById('goalGrid');
const movesSpan = document.getElementById('movesCount');
const statusSpan = document.getElementById('statusBar');
const gameScoreSpan = document.getElementById('gameScore');
const gamePmtSpan = document.getElementById('gamePmt');

function showGameScreen() {
    gameScreen.classList.remove('hidden');
    gameOverScreen.classList.add('hidden');
}

function showGameOverScreen() {
    gameScreen.classList.add('hidden');
    gameOverScreen.classList.remove('hidden');
    document.getElementById('finalLevel').innerText = LEVELS[currentLevel].name;
    document.getElementById('finalEarned').innerText = totalPMT;
}

function getSolvedBoard() {
    const total = rows * cols;
    let solved = [];
    for (let i = 1; i < total; i++) solved.push(i);
    solved.push(-1);
    return solved;
}

function isSolved() {
    const total = rows * cols;
    for (let i = 0; i < total; i++) {
        if (i === total - 1) { if (board[i] !== -1) return false; }
        else { if (board[i] !== i + 1) return false; }
    }
    return true;
}

function renderGoal() {
    const theme = THEMES[currentTheme];
    goalGrid.innerHTML = '';
    const sol = getSolvedBoard();
    for (let r = 0; r < rows; r++) {
        const rowDiv = document.createElement('div'); rowDiv.className = 'goal-row';
        for (let c = 0; c < cols; c++) {
            const v = sol[r * cols + c];
            const cell = document.createElement('div'); cell.className = 'goal-cell';
            cell.style.background = v === -1 ? theme.empty : theme.tile;
            cell.style.color = theme.text;
            cell.style.border = `1px solid ${theme.border}`;
            cell.textContent = v === -1 ? '□' : v;
            rowDiv.appendChild(cell);
        }
        goalGrid.appendChild(rowDiv);
    }
}

function renderPuzzle() {
    const theme = THEMES[currentTheme];
    const total = rows * cols;
    const fs = Math.max(12, Math.min(28, Math.floor(42 / Math.max(cols, rows)) * 1.2));
    puzzleGrid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
    puzzleGrid.style.aspectRatio = `${cols}/${rows}`;
    puzzleGrid.innerHTML = '';
    for (let i = 0; i < total; i++) {
        const v = board[i];
        const tile = document.createElement('div');
        tile.className = 'tile';
        tile.dataset.index = i;
        if (v === -1) {
            tile.classList.add('empty-tile');
            tile.style.background = theme.empty;
            tile.textContent = '';
        } else {
            tile.textContent = v;
            tile.style.background = theme.tile;
            tile.style.color = theme.text;
            tile.style.fontSize = `${fs}px`;
        }
        puzzleGrid.appendChild(tile);
    }
}

function showRewardToast(levelName, reward) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = `🎉 ${levelName} SOLVED! +${reward} PMT 🎉`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
}

function completeLevel() {
    if (levelCompleted) return;
    levelCompleted = true;
    
    const reward = LEVELS[currentLevel].reward;
    totalPMT += reward;
    totalScore += 1000;
    
    gameScoreSpan.innerText = totalScore;
    gamePmtSpan.innerText = totalPMT;
    
    // Send earnings to parent hub
    reportEarnings(reward);
    
    statusSpan.textContent = `🎉 ${LEVELS[currentLevel].name} COMPLETE! +${reward} PMT 🎉`;
    statusSpan.classList.add('win');
    showRewardToast(LEVELS[currentLevel].name, reward);
    
    if (typeof confetti === 'function') confetti({ particleCount: 150, spread: 70 });
    
    showGameOverScreen();
}

function tryMove(idx) {
    if (levelCompleted) return;
    const emptyIdx = board.indexOf(-1);
    const dr = Math.abs(Math.floor(idx / cols) - Math.floor(emptyIdx / cols));
    const dc = Math.abs((idx % cols) - (emptyIdx % cols));
    if (dr + dc === 1) {
        [board[idx], board[emptyIdx]] = [board[emptyIdx], board[idx]];
        moves++;
        movesSpan.innerText = moves;
        renderPuzzle();
        if (isSolved()) {
            completeLevel();
        }
    }
}

function shufflePuzzle(steps = 200) {
    board = getSolvedBoard();
    moves = 0;
    levelCompleted = false;
    movesSpan.innerText = moves;
    statusSpan.textContent = `✨ ${LEVELS[currentLevel].name} — slide to solve ✨`;
    statusSpan.classList.remove('win');
    
    let last = -1;
    for (let s = 0; s < steps; s++) {
        const emptyPos = board.indexOf(-1);
        const emptyRow = Math.floor(emptyPos / cols);
        const emptyCol = emptyPos % cols;
        let nb = [];
        if (emptyRow > 0) nb.push(emptyPos - cols);
        if (emptyRow < rows - 1) nb.push(emptyPos + cols);
        if (emptyCol > 0) nb.push(emptyPos - 1);
        if (emptyCol < cols - 1) nb.push(emptyPos + 1);
        let pool = nb.filter(n => n !== last);
        if (!pool.length) pool = nb;
        const pick = pool[Math.floor(Math.random() * pool.length)];
        [board[emptyPos], board[pick]] = [board[pick], board[emptyPos]];
        last = emptyPos;
    }
    moves = 0;
    levelCompleted = false;
    movesSpan.innerText = moves;
    renderPuzzle();
}

function loadLevel(levelIdx) {
    currentLevel = levelIdx;
    rows = LEVELS[levelIdx].rows;
    cols = LEVELS[levelIdx].cols;
    board = getSolvedBoard();
    shufflePuzzle(Math.max(150, rows * cols * 4));
    
    // Update level buttons
    const btns = document.querySelectorAll('#levelSelector .level-btn');
    btns.forEach((btn, i) => {
        if (i === levelIdx) btn.classList.add('active');
        else btn.classList.remove('active');
        if (i <= currentLevel) {
            btn.classList.add('unlocked');
            btn.classList.remove('locked');
        } else {
            btn.classList.add('locked');
            btn.classList.remove('unlocked');
        }
    });
    
    renderGoal();
    gamePmtSpan.innerText = totalPMT;
    gameScoreSpan.innerText = totalScore;
    levelCompleted = false;
    showGameScreen();
}

function nextLevel() {
    if (currentLevel + 1 < LEVELS.length) {
        loadLevel(currentLevel + 1);
    } else {
        // All levels completed
        statusSpan.textContent = "🏆 ALL LEVELS BEATEN! 🏆";
        setTimeout(() => {
            loadLevel(0);
            totalPMT = 0;
            totalScore = 0;
            gamePmtSpan.innerText = totalPMT;
            gameScoreSpan.innerText = totalScore;
        }, 2000);
    }
}

function restartGame() {
    totalPMT = 0;
    totalScore = 0;
    gamePmtSpan.innerText = totalPMT;
    gameScoreSpan.innerText = totalScore;
    loadLevel(0);
}

// Touch/click events
function initTouchEvents() {
    let ts = null, tx = 0, ty = 0, tt = 0;
    puzzleGrid.addEventListener('touchstart', e => {
        e.preventDefault();
        const tile = e.target.closest('.tile');
        if (!tile) return;
        ts = parseInt(tile.dataset.index);
        tx = e.touches[0].clientX;
        ty = e.touches[0].clientY;
        tt = Date.now();
    }, { passive: false });
    puzzleGrid.addEventListener('touchmove', e => {
        if (ts === null) return;
        e.preventDefault();
        const dx = e.touches[0].clientX - tx;
        const dy = e.touches[0].clientY - ty;
        if (Math.abs(dx) < 12 && Math.abs(dy) < 12) return;
        const ei = board.indexOf(-1);
        const sr = Math.floor(ts / cols), sc = ts % cols, er = Math.floor(ei / cols), ec = ei % cols;
        if (Math.abs(sr - er) + Math.abs(sc - ec) !== 1) { ts = null; return; }
        let ok = false;
        if (Math.abs(dx) > Math.abs(dy)) {
            if (dx > 12 && sc - ec === -1) ok = true;
            if (dx < -12 && sc - ec === 1) ok = true;
        } else {
            if (dy > 12 && sr - er === -1) ok = true;
            if (dy < -12 && sr - er === 1) ok = true;
        }
        if (ok) { tryMove(ts); ts = null; } else ts = null;
    }, { passive: false });
    puzzleGrid.addEventListener('touchend', () => {
        if (ts !== null && Date.now() - tt < 200) tryMove(ts);
        ts = null;
    });
    puzzleGrid.addEventListener('mousedown', e => {
        const tile = e.target.closest('.tile');
        if (tile) tryMove(parseInt(tile.dataset.index));
    });
}

// Level buttons
document.querySelectorAll('#levelSelector .level-btn').forEach((btn, i) => {
    btn.onclick = () => { if (i <= currentLevel && !levelCompleted) loadLevel(i); };
});

// Color theme
document.querySelectorAll('.color-dot').forEach(dot => {
    dot.onclick = () => {
        document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
        dot.classList.add('active');
        currentTheme = dot.dataset.color;
        renderGoal();
        renderPuzzle();
    };
});

// Buttons
document.getElementById('nextLevelBtn').onclick = nextLevel;
document.getElementById('restartGameBtn').onclick = () => {
    totalPMT = 0;
    totalScore = 0;
    gamePmtSpan.innerText = totalPMT;
    gameScoreSpan.innerText = totalScore;
    loadLevel(0);
};

initTouchEvents();
loadLevel(0);
</script>
</body>
</html>
