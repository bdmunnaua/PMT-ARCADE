<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#00ffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Neon Rush">
    <meta name="description" content="Fly the SU-57, dodge obstacles, collect coins — earn PMT!">
    <title>NEON RUSH 2077 | SU-57 Fighter</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }

        body {
            background: #050510;
            color: #e0f7ff;
            font-family: 'Rajdhani', sans-serif;
        }

        #gameContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #050510;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #hud {
            position: fixed;
            top: 10px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            padding: 12px 16px;
            z-index: 50;
            pointer-events: none;
        }
        .hud-stat {
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(0,255,255,0.3);
            border-radius: 6px;
            padding: 6px 12px;
            font-family: 'Orbitron', monospace;
            font-size: 12px;
            color: #00ffff;
        }

        .game-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(160deg, #050510 0%, #0a0a20 60%, #050518 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            text-align: center;
            padding: 20px;
        }
        .hidden { display: none !important; }

        .game-logo {
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            font-size: clamp(2rem, 8vw, 3.5rem);
            background: linear-gradient(90deg, #00ffff, #ff00ff, #00ffff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
            letter-spacing: 2px;
            filter: drop-shadow(0 0 20px rgba(0,255,255,0.5));
        }
        @keyframes shimmer {
            to { background-position: 200% center; }
        }

        .btn {
            background: linear-gradient(135deg, rgba(0,255,255,0.15), rgba(0,128,255,0.15));
            color: #00ffff;
            border: 1.5px solid #00ffff;
            padding: 14px 32px;
            margin: 8px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            min-width: 220px;
            transition: all 0.2s;
        }
        .btn:active { transform: scale(0.98); background: rgba(0,255,255,0.3); }

        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin: 16px 0;
            max-width: 420px;
            width: 100%;
        }
        .result-box {
            background: rgba(0,255,255,0.07);
            border: 1px solid rgba(0,255,255,0.25);
            border-radius: 8px;
            padding: 14px;
        }

        .keyboard-hint {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(0,255,255,0.3);
            border-radius: 8px;
            padding: 8px 15px;
            font-family: 'Orbitron', monospace;
            font-size: 12px;
            color: #00ffff;
            z-index: 200;
            pointer-events: none;
        }
        @media (max-width: 768px) {
            .keyboard-hint { display: none; }
        }

        .ad-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 200;
            background: rgba(0,0,0,0.5);
            border-radius: 8px;
            padding: 4px 8px;
            font-size: 10px;
            color: rgba(255,255,255,0.3);
            pointer-events: none;
        }
    </style>
</head>
<body>
<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    
    <div class="keyboard-hint">← →  ARROW KEYS TO MOVE SU-57</div>
    <div class="ad-container">📢 AD SPACE</div>

    <div id="hud" style="display:none;">
        <div class="hud-stat">LVL <span id="hLevel">1</span></div>
        <div class="hud-stat">⬆ <span id="hHeight">0</span>m</div>
        <div class="hud-stat">★ <span id="hScore">0</span></div>
        <div class="hud-stat">PMT <span id="hPmt">0.000</span></div>
        <div class="hud-stat">♥ <span id="hLives">3</span></div>
    </div>

    <!-- START SCREEN -->
    <div id="startScreen" class="game-overlay">
        <div class="game-logo">NEON RUSH<br>2077</div>
        <p class="tagline" style="color:#00ffff; margin:10px 0 20px;">SU-57 FELON · ASCEND · EARN PMT</p>
        <button class="btn" id="startBtn">🚀 START GAME</button>
        <div class="card" style="margin-top:20px; background:rgba(0,255,255,0.07); border-radius:8px; padding:15px; max-width:300px;">
            <div style="font-size:12px; color:rgba(255,255,255,0.6);">
                ← → Arrow keys or touch & slide<br>
                Dodge obstacles • Collect coins<br>
                Each coin = PMT earned
            </div>
        </div>
    </div>

    <!-- GAME OVER SCREEN -->
    <div id="gameOverScreen" class="game-overlay hidden">
        <div class="game-logo" style="font-size:clamp(1.5rem,5vw,2.5rem); color:#ff0066; background:none; -webkit-text-fill-color:#ff0066;">CRASH!</div>
        <div class="result-grid">
            <div class="result-box"><div class="result-label">Height</div><div id="finalHeight">0</div></div>
            <div class="result-box"><div class="result-label">Score</div><div id="finalScore">0</div></div>
            <div class="result-box"><div class="result-label">Earned</div><div id="finalEarned">0</div></div>
        </div>
        <button class="btn" id="restartBtn">🔄 PLAY AGAIN</button>
    </div>
</div>

<script>
// =====================================================
// NEON RUSH 2077 — Pure Gameplay (No Auth)
// Sends earnings to parent hub via postMessage
// Works standalone or inside PMT Arcade hub
// =====================================================

// Send earnings to parent hub (if inside iframe)
function reportEarnings(amount) {
    if (window.parent !== window) {
        window.parent.postMessage({ type: 'earnPMT', game: 'neonrush', amount: amount }, '*');
    }
    console.log(`💰 Earned: ${amount} PMT`);
}

class NeonRushGame {
    constructor() {
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        
        this.leftPressed = false;
        this.rightPressed = false;
        
        this.score = 0;
        this.pmtEarned = 0;
        this.level = 1;
        this.lives = 3;
        this.gameRunning = false;
        this.scrollSpeed = 4;
        this.player = { x: 400, y: 500, width: 55, height: 35 };
        this.obstacles = [];
        this.coins = [];
        this.particles = [];
        this.lastObstacleTime = 0;
        this.lastCoinTime = 0;
        this.totalHeight = 0;
        this.cameraY = 0;
        
        this.init();
    }
    
    init() {
        this.resize();
        this.setupControls();
        this.gameLoop();
        
        window.addEventListener('resize', () => this.resize());
        window.addEventListener('orientationchange', () => setTimeout(() => this.resize(), 100));
        
        document.getElementById('startBtn').onclick = () => this.startGame();
        document.getElementById('restartBtn').onclick = () => this.startGame();
        
        console.log('Neon Rush 2077 — Pure Gameplay Mode');
    }
    
    resize() {
        this.canvas.width = window.innerWidth;
        this.canvas.height = window.innerHeight;
        if (this.player) {
            this.player.x = this.canvas.width / 2;
            this.player.y = this.canvas.height - 180;
        }
    }
    
    setupControls() {
        // Keyboard
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') { this.leftPressed = true; e.preventDefault(); }
            if (e.key === 'ArrowRight') { this.rightPressed = true; e.preventDefault(); }
        });
        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft') { this.leftPressed = false; e.preventDefault(); }
            if (e.key === 'ArrowRight') { this.rightPressed = false; e.preventDefault(); }
        });
        
        // Touch
        const moveShip = (clientX) => {
            if (!this.gameRunning) return;
            const rect = this.canvas.getBoundingClientRect();
            let x = clientX - rect.left;
            x = Math.max(45, Math.min(this.canvas.width - 45, (x / rect.width) * this.canvas.width));
            this.player.x = x;
        };
        
        document.addEventListener('touchstart', (e) => {
            if (this.gameRunning) { e.preventDefault(); if(e.touches[0]) moveShip(e.touches[0].clientX); }
        }, { passive: false });
        document.addEventListener('touchmove', (e) => {
            if (this.gameRunning) { e.preventDefault(); if(e.touches[0]) moveShip(e.touches[0].clientX); }
        }, { passive: false });
        
        // Mouse
        this.canvas.addEventListener('mousemove', (e) => {
            if (this.gameRunning && e.buttons === 1) {
                const rect = this.canvas.getBoundingClientRect();
                let x = e.clientX - rect.left;
                x = Math.max(45, Math.min(this.canvas.width - 45, (x / rect.width) * this.canvas.width));
                this.player.x = x;
            }
        });
        this.canvas.addEventListener('mousedown', (e) => {
            if (this.gameRunning) {
                const rect = this.canvas.getBoundingClientRect();
                let x = e.clientX - rect.left;
                x = Math.max(45, Math.min(this.canvas.width - 45, (x / rect.width) * this.canvas.width));
                this.player.x = x;
            }
        });
    }
    
    startGame() {
        this.gameRunning = true;
        this.score = 0;
        this.lives = 3;
        this.level = 1;
        this.scrollSpeed = 4;
        this.pmtEarned = 0;
        this.obstacles = [];
        this.coins = [];
        this.particles = [];
        this.totalHeight = 0;
        this.cameraY = 0;
        this.player = {
            x: this.canvas.width / 2,
            y: this.canvas.height - 180,
            width: 55,
            height: 35
        };
        
        document.getElementById('hud').style.display = 'flex';
        document.getElementById('startScreen').classList.add('hidden');
        document.getElementById('gameOverScreen').classList.add('hidden');
        this.updateHUD();
    }
    
    updateHUD() {
        document.getElementById('hLevel').innerText = this.level;
        document.getElementById('hScore').innerText = this.score;
        document.getElementById('hPmt').innerText = this.pmtEarned.toFixed(3);
        document.getElementById('hLives').innerText = this.lives;
        document.getElementById('hHeight').innerText = Math.floor(this.totalHeight / 10);
    }
    
    gameLoop() {
        if (this.gameRunning) {
            this.update();
            this.render();
        }
        requestAnimationFrame(() => this.gameLoop());
    }
    
    update() {
        // Movement
        const MOVE_SPEED = 8;
        if (this.leftPressed) this.player.x -= MOVE_SPEED;
        if (this.rightPressed) this.player.x += MOVE_SPEED;
        this.player.x = Math.max(45, Math.min(this.canvas.width - 45, this.player.x));
        
        this.cameraY -= this.scrollSpeed;
        this.totalHeight += this.scrollSpeed;
        
        const now = Date.now();
        if (now - this.lastObstacleTime > 1200 - (this.level * 60)) {
            this.createObstacle();
            this.lastObstacleTime = now;
        }
        if (now - this.lastCoinTime > 800) {
            this.createCoin();
            this.lastCoinTime = now;
        }
        
        // Obstacle collision
        for (let i = this.obstacles.length - 1; i >= 0; i--) {
            const o = this.obstacles[i];
            o.y += this.scrollSpeed + 3;
            if (o.y - this.cameraY > this.canvas.height + 100) {
                this.obstacles.splice(i, 1);
                continue;
            }
            const sy = o.y - this.cameraY;
            const pL = this.player.x - this.player.width / 2;
            const pR = this.player.x + this.player.width / 2;
            const pT = this.player.y;
            const pB = this.player.y + this.player.height;
            
            if (pR > o.x - o.width / 2 && pL < o.x + o.width / 2 && pB > sy && pT < sy + o.height) {
                this.lives--;
                this.createExplosion(o.x, sy);
                this.obstacles.splice(i, 1);
                this.updateHUD();
                if (this.lives <= 0) {
                    this.gameOver();
                }
            }
        }
        
        // Coin collection
        for (let i = this.coins.length - 1; i >= 0; i--) {
            const c = this.coins[i];
            c.y += this.scrollSpeed;
            if (c.y - this.cameraY > this.canvas.height + 50) {
                this.coins.splice(i, 1);
                continue;
            }
            const sy = c.y - this.cameraY;
            const dx = this.player.x - c.x;
            const dy = (this.player.y + this.player.height / 2) - sy;
            
            if (Math.sqrt(dx * dx + dy * dy) < 30) {
                this.score += 100;
                const earned = 0.10;
                this.pmtEarned += earned;
                
                // Report earnings to parent hub
                reportEarnings(earned);
                
                this.createParticles(c.x, sy, '#ffdd00');
                this.coins.splice(i, 1);
                this.updateHUD();
                
                if (this.score % 500 === 0) {
                    this.level++;
                    this.scrollSpeed += 0.7;
                    this.createParticles(this.canvas.width / 2, 300, '#00ffff');
                }
            }
        }
        
        // Particles
        for (let i = this.particles.length - 1; i >= 0; i--) {
            const p = this.particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.alpha -= 0.03;
            p.size -= 0.15;
            if (p.alpha <= 0 || p.size <= 0) {
                this.particles.splice(i, 1);
            }
        }
        
        this.score++;
        if (this.score % 100 === 0) this.updateHUD();
    }
    
    render() {
        const ctx = this.ctx;
        const W = this.canvas.width;
        const H = this.canvas.height;
        
        // Background
        const grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0, '#000814');
        grad.addColorStop(1, '#050510');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);
        
        // Stars
        ctx.fillStyle = '#ffffff';
        for (let i = 0; i < 100; i++) {
            const x = ((i * 137 + 50) % W);
            const y = ((Math.sin(i) * 1000 - this.cameraY * 0.2) % H + H) % H;
            ctx.globalAlpha = 0.4 + (i % 5) * 0.12;
            ctx.fillRect(x, y, 1.5, 1.5);
        }
        ctx.globalAlpha = 1;
        
        // SU-57 Fighter Jet
        const px = this.player.x;
        const py = this.player.y;
        
        ctx.save();
        ctx.shadowColor = '#00ffff';
        ctx.shadowBlur = 15;
        
        ctx.fillStyle = '#3a3a4a';
        ctx.beginPath();
        ctx.moveTo(px, py);
        ctx.lineTo(px - 12, py + 12);
        ctx.lineTo(px - 22, py + 28);
        ctx.lineTo(px - 32, py + 32);
        ctx.lineTo(px - 18, py + 34);
        ctx.lineTo(px, py + 38);
        ctx.lineTo(px + 18, py + 34);
        ctx.lineTo(px + 32, py + 32);
        ctx.lineTo(px + 22, py + 28);
        ctx.lineTo(px + 12, py + 12);
        ctx.closePath();
        ctx.fill();
        
        ctx.fillStyle = '#00ccff';
        ctx.beginPath();
        ctx.ellipse(px, py + 6, 6, 8, 0, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.strokeStyle = '#00ffff';
        ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(px - 8, py + 18); ctx.lineTo(px - 28, py + 30); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(px + 8, py + 18); ctx.lineTo(px + 28, py + 30); ctx.stroke();
        
        ctx.fillStyle = '#ff4400';
        ctx.shadowColor = '#ff6600';
        ctx.beginPath();
        ctx.moveTo(px - 6, py + 38);
        ctx.lineTo(px, py + 42 + Math.random() * 4);
        ctx.lineTo(px + 6, py + 38);
        ctx.fill();
        
        ctx.fillStyle = '#ffaa00';
        ctx.beginPath();
        ctx.moveTo(px - 4, py + 38);
        ctx.lineTo(px, py + 40 + Math.random() * 3);
        ctx.lineTo(px + 4, py + 38);
        ctx.fill();
        
        ctx.restore();
        
        // Obstacles
        this.obstacles.forEach(o => {
            const sy = o.y - this.cameraY;
            ctx.fillStyle = o.color;
            ctx.fillRect(o.x - o.width / 2, sy, o.width, o.height);
        });
        
        // Coins
        this.coins.forEach(c => {
            const sy = c.y - this.cameraY;
            ctx.fillStyle = '#ffdd00';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(c.x, sy, c.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.shadowBlur = 0;
            ctx.font = 'bold 14px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('$', c.x, sy);
        });
        
        // Particles
        this.particles.forEach(p => {
            ctx.save();
            ctx.globalAlpha = p.alpha;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        });
    }
    
    gameOver() {
        this.gameRunning = false;
        document.getElementById('hud').style.display = 'none';
        
        const earned = this.pmtEarned;
        document.getElementById('finalScore').innerText = this.score;
        document.getElementById('finalHeight').innerText = Math.floor(this.totalHeight / 10);
        document.getElementById('finalEarned').innerText = earned.toFixed(3);
        
        document.getElementById('gameOverScreen').classList.remove('hidden');
        
        // Small confetti on game over
        if (typeof confetti === 'function') {
            confetti({ particleCount: 50, spread: 40 });
        }
    }
    
    createObstacle() {
        const types = [
            { width: 70, height: 25, color: '#ff0066' },
            { width: 45, height: 45, color: '#ff6600' },
            { width: 90, height: 20, color: '#ff00ff' },
            { width: 35, height: 60, color: '#00ff99' },
            { width: 110, height: 18, color: '#ff3300' }
        ];
        const t = types[Math.floor(Math.random() * types.length)];
        this.obstacles.push({
            x: Math.random() * (this.canvas.width - 100) + 50,
            y: this.cameraY - 50,
            width: t.width,
            height: t.height,
            color: t.color
        });
    }
    
    createCoin() {
        this.coins.push({
            x: Math.random() * (this.canvas.width - 100) + 50,
            y: this.cameraY - 30,
            radius: 15
        });
    }
    
    createParticles(x, y, color) {
        for (let i = 0; i < 12; i++) {
            this.particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 10,
                vy: (Math.random() - 0.5) * 10,
                size: Math.random() * 5 + 2,
                color: color,
                alpha: 1
            });
        }
    }
    
    createExplosion(x, y) {
        for (let i = 0; i < 20; i++) {
            this.particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 20,
                vy: (Math.random() - 0.5) * 20,
                size: Math.random() * 8 + 3,
                color: '#ff0066',
                alpha: 1
            });
        }
    }
}

// Start the game
window.addEventListener('load', () => {
    console.log('Neon Rush 2077 — Pure Gameplay (No Auth)');
    new NeonRushGame();
});
</script>
</body>
</html>
